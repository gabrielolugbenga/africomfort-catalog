name: Update Africomfort Catalog

on:
  schedule:
    - cron: '0 0 * * *'  # Minuit UTC chaque jour
  workflow_dispatch:       # Permet de lancer manuellement depuis GitHub

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Run catalog update
        env:
          META_ACCESS_TOKEN: ${{ secrets.META_ACCESS_TOKEN }}
        run: python3 update_catalog.py

      - name: Commit and push changes
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add .
          git diff --cached --quiet || git commit -m "Auto-update catalog $(date +'%Y-%m-%d')"
          git push
